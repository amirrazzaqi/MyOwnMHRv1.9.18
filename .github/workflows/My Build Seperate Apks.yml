name: My Build Android APK in 3 Places- Manual

on:
  workflow_dispatch:   # فقط دستی اجرا شود

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Rust + Targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build Rust Libraries
        run: |
          cargo ndk -t arm64-v8a   --platform 24 build --release
          cargo ndk -t armeabi-v7a --platform 24 build --release
          cargo ndk -t x86_64      --platform 24 build --release

      - name: Build All APKs
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Prepare APKs
        run: |
          mkdir -p release
          VERSION=$(date +"%Y.%m.%d-%H%M")
          
          cp android/app/build/outputs/apk/release/app-universal-release.apk     release/mhrv-rs-${VERSION}-universal-release.apk
          cp android/app/build/outputs/apk/release/app-arm64-v8a-release.apk    release/mhrv-rs-${VERSION}-arm64-release.apk
          cp android/app/build/outputs/apk/release/app-x86_64-release.apk       release/mhrv-rs-${VERSION}-x86_64-release.apk
          cp android/app/build/outputs/apk/release/app-armeabi-v7a-release.apk  release/mhrv-rs-${VERSION}-armeabi-v7a-release.apk
          
          echo "✅ APKs prepared with version: ${VERSION}"
          ls -lh release/

      - name: Commit APKs to release folder
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📦 Update release APKs - ${{ github.run_number }}"
          branch: main
          file_pattern: release/*.apk
          add_options: '-f'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: manual-build-${{ github.run_number }}
          name: Manual Build #${{ github.run_number }}
          files: release/*.apk
          draft: false
          prerelease: false
          generate_release_notes: false
          body: |
            **Manual Android Build**

            ساخته شده در: ${{ github.event.repository.updated_at }}
            Workflow Run: #${{ github.run_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
