name: My Build APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build Rust for Android
        run: |
          cargo ndk -t arm64-v8a   --platform 24 build --release
          cargo ndk -t armeabi-v7a --platform 24 build --release
          cargo ndk -t x86_64      --platform 24 build --release

      - name: Build APK
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace
          ./gradlew assembleDebug --no-daemon

      # === کپی تمام APKهای ساخته شده ===
      - name: Prepare APKs
        run: |
          mkdir -p apks
          
          echo "=== Release APKs ==="
          ls -la android/app/build/outputs/apk/release/
          
          # کپی Universal (بهترین گزینه برای اکثر کاربران)
          cp android/app/build/outputs/apk/release/app-universal-release.apk apks/mhrv-rs-${{ github.ref_name || 'latest' }}-universal-release.apk 2>/dev/null || echo "Universal APK not found"
          
          # کپی بقیه ABIها (اختیاری)
          cp android/app/build/outputs/apk/release/app-arm64-v8a-release.apk apks/mhrv-rs-${{ github.ref_name || 'latest' }}-arm64-release.apk 2>/dev/null || true
          cp android/app/build/outputs/apk/release/app-x86_64-release.apk apks/mhrv-rs-${{ github.ref_name || 'latest' }}-x86_64-release.apk 2>/dev/null || true
          
          echo "=== Debug APKs ==="
          ls -la android/app/build/outputs/apk/debug/ || true
          cp android/app/build/outputs/apk/debug/app-debug.apk apks/mhrv-rs-${{ github.ref_name || 'latest' }}-debug.apk 2>/dev/null || true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mhrv-rs-android-apks
          path: apks/
          retention-days: 30

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: apks/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
