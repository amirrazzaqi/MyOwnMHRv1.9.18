name: My Build Windows (CLI + UI) → releases/
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'نسخه برای نام‌گذاری فایل‌ها (مثال: 1.8.5)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: windows-release

      - name: Install MSYS2 GCC
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc

      - name: Configure Linker
        shell: pwsh
        run: |
          $gcc = "${{ steps.msys2.outputs.msys2-location }}\mingw64\bin\gcc.exe" -replace '\\','/'
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.cargo"
          @"
[target.x86_64-pc-windows-gnu]
linker = '$gcc'
"@ | Out-File -FilePath "$env:USERPROFILE\.cargo\config.toml" -Encoding utf8 -Append

      - name: Build CLI
        run: cargo build --release --target x86_64-pc-windows-gnu --bin mhrv-rs

      - name: Build UI
        run: cargo build --release --target x86_64-pc-windows-gnu --features ui --bin mhrv-rs-ui

      - name: Prepare & Copy to releases/
        shell: pwsh
        env:
          VERSION: ${{ inputs.version }}
        run: |
          $ver = $env:VERSION
          
          # Create dist folder
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          
          Copy-Item "target/x86_64-pc-windows-gnu/release/mhrv-rs.exe" -Destination "dist/mhrv-rs.exe"
          Copy-Item "target/x86_64-pc-windows-gnu/release/mhrv-rs-ui.exe" -Destination "dist/mhrv-rs-ui.exe"
          Copy-Item "assets/launchers/run.bat" -Destination "dist/run.bat" -ErrorAction SilentlyContinue
          
          # Create ZIP
          Compress-Archive -Path "dist/*" -DestinationPath "mhrv-rs-windows-x86_64-v$ver.zip" -Force
          
          # Copy to releases/ folder
          New-Item -ItemType Directory -Force -Path releases | Out-Null
          
          # Remove old windows files
          Remove-Item releases/mhrv-rs-windows*.zip, releases/mhrv-rs.exe, releases/mhrv-rs-ui.exe, releases/run.bat -ErrorAction SilentlyContinue
          
          # Copy new files
          Copy-Item "mhrv-rs-windows-x86_64-v$ver.zip" -Destination "releases/"
          Copy-Item "dist/mhrv-rs.exe", "dist/mhrv-rs-ui.exe", "dist/run.bat" -Destination "releases/" -Force

      - name: Commit and Push to main
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add releases/
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "chore(releases): update Windows binaries v${{ inputs.version }}" \
                     -m "Built by build-windows workflow (CLI + UI)"
          
          git push origin HEAD:main
