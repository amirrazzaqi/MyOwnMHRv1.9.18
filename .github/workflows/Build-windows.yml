name: Build Windows Only → releases/

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Install GCC
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc

      - name: Configure Linker
        shell: pwsh
        run: |
          $gcc = "${{ steps.msys2.outputs.msys2-location }}\mingw64\bin\gcc.exe" -replace '\\','/'
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.cargo"
          @"
[target.x86_64-pc-windows-gnu]
linker = '$gcc'
"@ | Out-File -FilePath "$env:USERPROFILE\.cargo\config.toml" -Encoding utf8 -Append

      - name: Build CLI
        run: cargo build --release --target x86_64-pc-windows-gnu --bin mhrv-rs

      - name: Build UI
        run: cargo build --release --target x86_64-pc-windows-gnu --features ui --bin mhrv-rs-ui

      - name: Copy files to releases/ folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path releases | Out-Null
          
          Remove-Item releases/mhrv-rs*.exe, releases/run.bat -ErrorAction SilentlyContinue
          
          Copy-Item "target/x86_64-pc-windows-gnu/release/mhrv-rs.exe" -Destination "releases/mhrv-rs.exe"
          Copy-Item "target/x86_64-pc-windows-gnu/release/mhrv-rs-ui.exe" -Destination "releases/mhrv-rs-ui.exe"
          Copy-Item "assets/launchers/run.bat" -Destination "releases/run.bat" -ErrorAction SilentlyContinue

      - name: Commit and Push to main
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add releases/
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "chore(releases): update Windows executables"
          git push origin HEAD:main
