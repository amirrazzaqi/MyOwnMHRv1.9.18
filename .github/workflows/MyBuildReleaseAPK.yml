name: 10_Build Android APKs - Manual

on:
  workflow_dispatch:

# ===== Permissions اضافه شده =====
permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build Rust for Android
        run: |
          cargo ndk -t arm64-v8a   --platform 24 build --release
          cargo ndk -t armeabi-v7a --platform 24 build --release
          cargo ndk -t x86_64      --platform 24 build --release

      - name: Build APKs
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Prepare APKs
        run: |
          mkdir -p apks
          VERSION=$(date +"%Y.%m.%d")
          
          cp android/app/build/outputs/apk/release/app-universal-release.apk     apks/mhrv-rs-${VERSION}-universal-release.apk
          cp android/app/build/outputs/apk/release/app-arm64-v8a-release.apk    apks/mhrv-rs-${VERSION}-arm64-release.apk
          cp android/app/build/outputs/apk/release/app-x86_64-release.apk       apks/mhrv-rs-${VERSION}-x86_64-release.apk
          cp android/app/build/outputs/apk/release/app-armeabi-v7a-release.apk  apks/mhrv-rs-${VERSION}-armeabi-v7a-release.apk

          ls -lh apks/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mhrv-rs-apks
          path: apks/
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Android Build #${{ github.run_number }}
          files: apks/*.apk
          draft: false
          prerelease: false
          generate_release_notes: false   # این را false کردم تا ارور نده
          body: |
            **Manual Android Build**

            Run Number: #${{ github.run_number }}
            تاریخ ساخت: $(date)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
